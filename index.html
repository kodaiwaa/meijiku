<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>命軸｜三軸命式占い</title>
<meta name="description" content="生年月日から、本質・行動スタイル・今年の流れを読む自己理解ツール">

<meta property="og:type" content="website">
<meta property="og:url" content="https://kodaiwaa.github.io/meijiku/">
<meta property="og:title" content="命軸｜三軸命式占い">
<meta property="og:description" content="生年月日から、本質・行動スタイル・今年の流れを読む自己理解ツール">

<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:locale" content="ja_JP">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="命軸｜三軸命式占い">
<meta name="twitter:description" content="生年月日から、本質・行動スタイル・今年の流れを読む自己理解ツール">
<meta name="twitter:image" content="https://kodaiwaa.github.io/meijiku/ogp.png">
<style>
  :root {
    --ink: #1a1814;
    --ink-mid: #5a5650;
    --ink-light: #9a948e;
    --paper: #faf8f4;
    --paper-warm: #f2ede4;
    --paper-card: #ffffff;
    --accent: #8b4513;
    --accent-light: #c8845a;
    --accent-pale: #f5ebe0;
    --resonance: #4a6741;
    --resonance-pale: #eaf2e8;
    --border: rgba(90,86,80,0.15);
    --border-mid: rgba(90,86,80,0.25);
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Hiragino Mincho ProN', 'Yu Mincho', 'Georgia', serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    padding: 0;
  }

  .app {
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ヘッダー */
  .header {
    padding: 2rem 1.5rem 1.5rem;
    border-bottom: 0.5px solid var(--border);
    background: var(--paper);
  }

  .header-title {
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--ink-light);
    margin-bottom: 6px;
    font-family: 'Hiragino Kaku Gothic ProN', sans-serif;
  }

  .header-name {
    font-size: 22px;
    font-weight: 400;
    letter-spacing: 0.1em;
    color: var(--ink);
  }

  .header-name span {
    color: var(--accent);
  }

  /* 入力エリア */
  .input-section {
    padding: 1.5rem;
    background: var(--paper);
  }

  .input-label {
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--ink-light);
    font-family: 'Hiragino Kaku Gothic ProN', sans-serif;
    margin-bottom: 10px;
    display: block;
  }

  .date-row {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 12px;
  }

  .date-field {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .date-field.year { flex: 2; }
  .date-field.month { flex: 1; }
  .date-field.day { flex: 1; }

  .date-field-label {
    font-size: 10px;
    color: var(--ink-light);
    font-family: 'Hiragino Kaku Gothic ProN', sans-serif;
    letter-spacing: 0.1em;
  }

  input[type="number"] {
    width: 100%;
    height: 44px;
    border: 0.5px solid var(--border-mid);
    border-radius: var(--radius-sm);
    background: var(--paper-card);
    color: var(--ink);
    font-size: 16px;
    font-family: 'Hiragino Kaku Gothic ProN', sans-serif;
    padding: 0 12px;
    outline: none;
    transition: border-color 0.2s;
    -moz-appearance: textfield;
  }

  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }

  input[type="number"]:focus {
    border-color: var(--accent-light);
  }

  .year-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }

  .year-field {
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex: 1;
  }

  .submit-btn {
    width: 100%;
    height: 52px;
    background: var(--accent);
    color: #faf8f4;
    border: none;
    border-radius: var(--radius);
    font-size: 15px;
    font-family: 'Hiragino Kaku Gothic ProN', sans-serif;
    letter-spacing: 0.15em;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    margin-top: 16px;
  }

  .submit-btn:hover { opacity: 0.88; }
  .submit-btn:active { transform: scale(0.98); }

  .compat-section {
    padding: 1.5rem;
    background: var(--paper);
  }

  .compat-title {
    font-size: 16px;
    font-weight: 400;
    letter-spacing: 0.1em;
    color: var(--ink);
    margin-bottom: 6px;
  }

  .compat-desc {
    font-size: 11px;
    line-height: 1.8;
    color: var(--ink-light);
    font-family: 'Hiragino Kaku Gothic ProN', sans-serif;
    margin-bottom: 14px;
  }

  .compat-person {
    margin-bottom: 14px;
  }

  .compat-person-label {
    display: block;
    font-size: 10px;
    color: var(--accent);
    font-family: 'Hiragino Kaku Gothic ProN', sans-serif;
    letter-spacing: 0.14em;
    margin-bottom: 8px;
  }

  .compat-result {
    display: none;
    padding: 1.5rem;
  }

  .compat-result.visible { display: block; }

  .compat-score-card {
    background: var(--paper-card);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem;
    margin-bottom: 12px;
  }

  .compat-score-label {
    font-size: 10px;
    color: var(--ink-light);
    font-family: 'Hiragino Kaku Gothic ProN', sans-serif;
    letter-spacing: 0.18em;
    margin-bottom: 6px;
  }

  .compat-score {
    font-size: 42px;
    line-height: 1;
    color: var(--accent);
    font-family: 'Hiragino Mincho ProN', 'Yu Mincho', serif;
    margin-bottom: 8px;
  }

  .compat-score span {
    font-size: 16px;
    color: var(--ink-light);
  }

  .compat-score-title {
    font-size: 15px;
    line-height: 1.7;
    color: var(--ink);
  }

  .compat-people {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 12px;
  }

  .compat-person-card {
    background: var(--paper-card);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
  }

  .compat-person-name {
    font-size: 11px;
    color: var(--ink-light);
    font-family: 'Hiragino Kaku Gothic ProN', sans-serif;
    letter-spacing: 0.12em;
    margin-bottom: 4px;
  }

  .compat-person-summary {
    font-size: 13px;
    line-height: 1.7;
    color: var(--ink-mid);
  }

  .compat-breakdown {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 12px;
  }

  .compat-bar-row {
    display: grid;
    grid-template-columns: 64px 1fr 44px;
    gap: 8px;
    align-items: center;
    font-family: 'Hiragino Kaku Gothic ProN', sans-serif;
    font-size: 11px;
    color: var(--ink-mid);
  }

  .compat-bar-track {
    height: 7px;
    border-radius: 999px;
    background: var(--paper-warm);
    overflow: hidden;
  }

  .compat-bar-fill {
    height: 100%;
    border-radius: 999px;
    background: var(--resonance);
  }

  .compat-comments {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .compat-comment-card {
    background: var(--paper-card);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem 1.25rem;
  }

  /* 区切り */
  .divider {
    height: 0.5px;
    background: var(--border);
    margin: 0 1.5rem;
  }

  /* 結果エリア */
  .result-section {
    padding: 1.5rem;
    display: none;
  }

  .result-section.visible { display: block; }

  /* 命式ヘッダー */
  .meishiki-header {
    margin-bottom: 1.5rem;
  }

  .meishiki-label {
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--ink-light);
    font-family: 'Hiragino Kaku Gothic ProN', sans-serif;
    margin-bottom: 6px;
  }

  .meishiki-number {
    font-size: 13px;
    color: var(--accent-light);
    font-family: 'Hiragino Kaku Gothic ProN', sans-serif;
    letter-spacing: 0.1em;
    margin-bottom: 4px;
  }

  .meishiki-title {
    font-size: 26px;
    font-weight: 400;
    letter-spacing: 0.08em;
    color: var(--ink);
    line-height: 1.3;
    margin-bottom: 10px;
  }

  /* タグ */
  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 1.25rem;
  }

  .tag {
    display: inline-block;
    padding: 4px 10px;
    border: 0.5px solid var(--border-mid);
    border-radius: 20px;
    font-size: 12px;
    font-family: 'Hiragino Kaku Gothic ProN', sans-serif;
    color: var(--ink-mid);
    letter-spacing: 0.05em;
    background: var(--paper-card);
  }

  .tag.resonance {
    border-color: var(--resonance);
    color: var(--resonance);
    background: var(--resonance-pale);
  }

  /* サマリー */
  .summary-text {
    font-size: 14px;
    line-height: 1.9;
    color: var(--ink-mid);
    padding: 1rem 0;
    border-top: 0.5px solid var(--border);
    border-bottom: 0.5px solid var(--border);
    margin-bottom: 1.5rem;
  }

  /* 詳細カード */
  .detail-section {
    display: none;
  }

  .detail-section.visible { display: block; }

  .detail-toggle {
    width: 100%;
    background: none;
    border: 0.5px solid var(--border-mid);
    border-radius: var(--radius);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    margin-bottom: 1rem;
    color: var(--ink-mid);
    font-size: 13px;
    font-family: 'Hiragino Kaku Gothic ProN', sans-serif;
    letter-spacing: 0.1em;
    transition: background 0.15s;
  }

  .detail-toggle:hover { background: var(--paper-warm); }

  .toggle-icon {
    font-size: 16px;
    transition: transform 0.2s;
  }

  .toggle-icon.open { transform: rotate(180deg); }

  .detail-cards {
    display: none;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 1rem;
  }

  .detail-cards.visible { display: flex; }

  .detail-card {
    background: var(--paper-card);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem 1.25rem;
  }

  .detail-card-label {
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--ink-light);
    font-family: 'Hiragino Kaku Gothic ProN', sans-serif;
    margin-bottom: 4px;
  }

  .detail-card-title {
    font-size: 16px;
    font-weight: 400;
    letter-spacing: 0.08em;
    margin-bottom: 10px;
    color: var(--ink);
  }

  .detail-card-body {
    font-size: 13px;
    line-height: 1.85;
    color: var(--ink-mid);
    margin-bottom: 10px;
  }

  .detail-sub {
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding-top: 10px;
    border-top: 0.5px solid var(--border);
  }

  .detail-sub-row {
    display: flex;
    gap: 8px;
    align-items: flex-start;
  }

  .detail-sub-label {
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--ink-light);
    font-family: 'Hiragino Kaku Gothic ProN', sans-serif;
    min-width: 48px;
    padding-top: 2px;
  }

  .detail-sub-text {
    font-size: 12px;
    line-height: 1.7;
    color: var(--ink-mid);
    flex: 1;
  }

  .keywords {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    padding-top: 8px;
  }

  .keyword-chip {
    padding: 2px 8px;
    background: var(--accent-pale);
    border-radius: 4px;
    font-size: 11px;
    color: var(--accent);
    font-family: 'Hiragino Kaku Gothic ProN', sans-serif;
  }

  .advice-box {
    background: var(--paper-warm);
    border-left: 2px solid var(--accent-light);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    padding: 10px 12px;
    margin-top: 10px;
    font-size: 12px;
    line-height: 1.8;
    color: var(--ink-mid);
  }

  .monthly-advice {
    border-color: var(--resonance);
    background: var(--resonance-pale);
  }

  .advice-label {
    display: block;
    margin-bottom: 4px;
    font-family: 'Hiragino Kaku Gothic ProN', sans-serif;
    font-size: 10px;
    letter-spacing: 0.14em;
    color: var(--ink-light);
  }

  .resonance-card {
    border-color: var(--resonance);
  }

  .resonance-card .detail-card-label {
    color: var(--resonance);
  }

  /* リセット */
  .reset-btn {
    display: block;
    width: 100%;
    background: none;
    border: none;
    padding: 1rem;
    font-size: 12px;
    font-family: 'Hiragino Kaku Gothic ProN', sans-serif;
    letter-spacing: 0.15em;
    color: var(--ink-light);
    cursor: pointer;
    text-align: center;
    margin-top: 0.5rem;
  }

  .reset-btn:hover { color: var(--ink-mid); }

  /* ローディング */
  .loading {
    display: none;
    text-align: center;
    padding: 2rem;
    color: var(--ink-light);
    font-size: 13px;
    font-family: 'Hiragino Kaku Gothic ProN', sans-serif;
    letter-spacing: 0.15em;
  }

  .loading.visible { display: block; }

  .loading-dots::after {
    content: '';
    animation: dots 1.2s steps(4, end) infinite;
  }

  @keyframes dots {
    0%   { content: ''; }
    25%  { content: '・'; }
    50%  { content: '・・'; }
    75%  { content: '・・・'; }
    100% { content: ''; }
  }

  /* フェードイン */
  .fade-in {
    animation: fadeIn 0.4s ease-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .header-subtitle {
    font-size: 12px;
    letter-spacing: 0.15em;
    color: var(--ink-light);
    font-family: 'Hiragino Kaku Gothic ProN', sans-serif;
    margin-top: 4px;
    margin-bottom: 12px;
  }

  .header-desc {
    font-size: 12px;
    line-height: 1.8;
    color: var(--ink-light);
    font-family: 'Hiragino Kaku Gothic ProN', sans-serif;
    letter-spacing: 0.03em;
  }

  .copy-btn {
    width: 100%;
    height: 44px;
    background: none;
    border: 0.5px solid var(--border-mid);
    border-radius: var(--radius);
    font-size: 13px;
    font-family: 'Hiragino Kaku Gothic ProN', sans-serif;
    letter-spacing: 0.12em;
    color: var(--ink-mid);
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    margin-top: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .copy-btn:hover { background: var(--paper-warm); }
  .copy-btn.copied { color: var(--resonance); border-color: var(--resonance); }

  .footer-note {
    padding: 1.5rem;
    border-top: 0.5px solid var(--border);
    margin-top: 1rem;
  }

  .footer-note p {
    font-size: 10px;
    line-height: 1.7;
    color: var(--ink-light);
    font-family: 'Hiragino Kaku Gothic ProN', sans-serif;
    letter-spacing: 0.05em;
  }
    display: none;
    background: var(--paper-warm);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 1rem;
    font-size: 11px;
    font-family: monospace;
    color: var(--ink-mid);
    white-space: pre-wrap;
    word-break: break-all;
    margin-top: 1rem;
  }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <p class="header-title">MEIJIKU</p>
    <h1 class="header-name">命<span>軸</span></h1>
    <p class="header-subtitle">三軸命式占い</p>
    <p class="header-desc">生年月日から、あなたの本質・行動パターン・今年の流れを読みます。<br>干支と暦をベースにした、伝統と独自解釈の自己理解ツールです。</p>
  </div>

  <div class="input-section">
    <span class="input-label">生年月日を入力してください</span>
    <div class="date-row">
      <div class="date-field year">
        <span class="date-field-label">年</span>
        <input type="number" id="year" placeholder="1990" min="1900" max="2025">
      </div>
      <div class="date-field month">
        <span class="date-field-label">月</span>
        <input type="number" id="month" placeholder="4" min="1" max="12">
      </div>
      <div class="date-field day">
        <span class="date-field-label">日</span>
        <input type="number" id="day" placeholder="15" min="1" max="31">
      </div>
    </div>

    <div class="year-row">
      <div class="year-field">
        <span class="date-field-label">占う年（デフォルト：今年）</span>
        <input type="number" id="current-year" placeholder="2026" min="1900" max="2100">
      </div>
    </div>

    <button class="submit-btn" onclick="calculate()">命式を見る</button>
  </div>

  <div class="divider"></div>

  <div class="compat-section">
    <h2 class="compat-title">相性診断</h2>
    <p class="compat-desc">2人の生年月日から、命式・行動スタイル・周期タイプの重なりを読みます。</p>

    <div class="compat-person">
      <span class="compat-person-label">あなた</span>
      <div class="date-row">
        <div class="date-field year">
          <span class="date-field-label">年</span>
          <input type="number" id="compat-a-year" placeholder="1990" min="1900" max="2025">
        </div>
        <div class="date-field month">
          <span class="date-field-label">月</span>
          <input type="number" id="compat-a-month" placeholder="4" min="1" max="12">
        </div>
        <div class="date-field day">
          <span class="date-field-label">日</span>
          <input type="number" id="compat-a-day" placeholder="15" min="1" max="31">
        </div>
      </div>
    </div>

    <div class="compat-person">
      <span class="compat-person-label">相手</span>
      <div class="date-row">
        <div class="date-field year">
          <span class="date-field-label">年</span>
          <input type="number" id="compat-b-year" placeholder="1995" min="1900" max="2025">
        </div>
        <div class="date-field month">
          <span class="date-field-label">月</span>
          <input type="number" id="compat-b-month" placeholder="8" min="1" max="12">
        </div>
        <div class="date-field day">
          <span class="date-field-label">日</span>
          <input type="number" id="compat-b-day" placeholder="20" min="1" max="31">
        </div>
      </div>
    </div>

    <button class="submit-btn" onclick="calculateCompatibility()">相性を見る</button>
  </div>

  <div class="compat-result" id="compat-result"></div>

  <div class="divider"></div>

  <div class="loading" id="loading">
    <span class="loading-dots">算出中</span>
  </div>

  <div class="result-section" id="result-section">

    <div class="meishiki-header">
      <p class="meishiki-label">MEISHIKI</p>
      <p class="meishiki-number" id="meishiki-number"></p>
      <h2 class="meishiki-title" id="meishiki-title"></h2>
      <div class="tags" id="tags"></div>
    </div>

    <p class="summary-text" id="summary"></p>

    <button class="copy-btn" id="copy-btn" onclick="copyResult()">
      <span>結果をコピー</span>
    </button>

    <button class="detail-toggle" id="detail-toggle" onclick="toggleDetail()">
      <span>詳しく見る</span>
      <span class="toggle-icon" id="toggle-icon">▼</span>
    </button>

    <div class="detail-section" id="detail-section">
      <div class="detail-cards" id="detail-cards"></div>
    </div>

    <button class="reset-btn" onclick="reset()">はじめから</button>

    <div class="debug" id="debug"></div>
  </div>

  <div class="footer-note">
    <p>この診断は、伝統暦・干支・十二運をベースにした娯楽・自己理解コンテンツです。結果は参考としてお楽しみください。</p>
  </div>

</div>

<script>
// ============================================================
// 干支・十二運データ
// ============================================================
const STEMS = ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
const BRANCHES = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];

// 十二運テーブル（日干ごとの十二運、地支順）
const JYUNITEN = {

function calcJulianDay(y, m, d) {
  if (m <= 2) { y -= 1; m += 12; }
  const A = Math.floor(y / 100);
  const B = 2 - A + Math.floor(A / 4);
  return Math.floor(365.25 * (y + 4716)) + Math.floor(30.6001 * (m + 1)) + d + B - 1524;
}

function calcDayPillar(year, month, day) {
  const jd = calcJulianDay(year, month, day);
  const idx = ((jd + 49) % 60 + 60) % 60;
  return {
    index: idx,
    stem: STEMS[idx % 10],
    branch: BRANCHES[idx % 12],
    kanshi: STEMS[idx % 10] + BRANCHES[idx % 12],
  };
}

function adjustedBirthYear(year, month, day) {
  const [lm, ld] = LICHUN_DATES[year] || [2, 4];
  if (month < lm || (month === lm && day < ld)) return year - 1;
  return year;
}

function calcCycle(dayPillarIdx, birthYear, birthMonth, birthDay) {
  const adjYear = adjustedBirthYear(birthYear, birthMonth, birthDay);
  const voidStr = VOID_TABLE[dayPillarIdx];
  const cycleKey = VOID_TO_CYCLE[voidStr];

  // 陰陽：生年の年支（立春補正後）
  const yearBranchIdx = ((adjYear - 4) % 12 + 12) % 12;
  const yearBranch = BRANCHES[yearBranchIdx];
  // 子寅辰午申戌 → 陽（インデックス偶数）
  const isYang = yearBranchIdx % 2 === 0;
  const polarityKey = isYang ? 'yang' : 'yin';
  const polarityLabel = isYang ? '陽' : '陰';

  // 共鳴型：生年の年支が空亡に含まれるか
  const isResonance = voidStr.includes(yearBranch);

  return { cycleKey, voidStr, yearBranch, polarityKey, polarityLabel, isResonance };
}

function calcFortuneStage(cycle, currentYear) {
  const stopBranch = cycle.polarityKey === 'yang'
    ? cycle.voidStr[0]
    : cycle.voidStr[1];
  const stopIdx = BRANCHES.indexOf(stopBranch);
  const currentBranchIdx = ((currentYear - 4) % 12 + 12) % 12;
  const diff = ((currentBranchIdx - stopIdx) + 12) % 12;
  return { stageLabel: FORTUNE_STAGES[diff], stageKey: FORTUNE_KEYS[diff] };
}

function calcActionStyle(stem, branch) {
  const branchIdx = BRANCHES.indexOf(branch);
  return JYUNITEN[stem][branchIdx];
}

function generateReading(dayPillar, actionStyle, cycleKey, polarityKey, fortuneKey, isResonance) {
  const { kanshi, stem, branch } = dayPillar;
  const override = PILLAR_OVERRIDES[kanshi];
  const stemData = PARTS.stems[stem];
  const branchData = PARTS.branches[branch];
  const actionData = PARTS.action_styles[actionStyle];
  const actionMonthly = PARTS.action_style_monthly[actionStyle];
  const cycleData = PARTS.cycles[cycleKey];
  const fortuneData = PARTS.fortune_stages[fortuneKey];

  // タイトル
  const title = override ? override.title : `${stem}${branch}の命式`;

  // 本質
  const essenceTrait = override ? override.core_trait : `${stemData.core_trait} ${branchData.core_trait}`;
  const essenceStrength = override ? override.strength : stemData.strength;
  const essenceShadow = override ? override.shadow : stemData.shadow;
  const essenceKeywords = override ? override.keywords : [stemData.keyword, branchData.keyword];

  // サマリー
  const cycleDisplay = cycleData.display + (polarityKey === 'yang' ? '陽' : '陰');
  const summary = `命式${kanshi}、${actionData.modifier_word}。${cycleDisplay}の周期を持ち、今年は${fortuneData.display_label}の時期にあります。${essenceTrait}`;

  return {
    title,
    summary,
    essence: { trait: essenceTrait, strength: essenceStrength, shadow: essenceShadow, keywords: essenceKeywords },
    action: { ...actionData, monthly: actionMonthly },
    cycle: { ...cycleData, polarityKey },
    fortune: fortuneData,
    isResonance,
  };
}

function calculate() {
  const year = parseInt(document.getElementById('year').value);
  const month = parseInt(document.getElementById('month').value);
  const day = parseInt(document.getElementById('day').value);
  const currentYear = parseInt(document.getElementById('current-year').value) || new Date().getFullYear();

  if (!year || !month || !day || year < 1900 || year > 2025 || month < 1 || month > 12 || day < 1 || day > 31) {
    alert('生年月日を正しく入力してください。');
    return;
  }

  document.getElementById('loading').classList.add('visible');
  document.getElementById('result-section').classList.remove('visible');

  setTimeout(() => {
    const dp = calcDayPillar(year, month, day);
    const { cycleKey, polarityKey, polarityLabel, isResonance, voidStr } = calcCycle(dp.index, year, month, day);
    const cycle = { cycleKey, polarityKey, voidStr };
    const { stageLabel, stageKey } = calcFortuneStage(cycle, currentYear);
    const actionStyle = calcActionStyle(dp.stem, dp.branch);
    const reading = generateReading(dp, actionStyle, cycleKey, polarityKey, stageKey, isResonance);

    renderResult(dp, reading, cycleKey, polarityLabel, stageKey, currentYear);
    document.getElementById('loading').classList.remove('visible');
    document.getElementById('result-section').classList.add('visible');
    document.getElementById('result-section').classList.add('fade-in');
  }, 600);
}

function isValidDateInput(year, month, day) {
  return year && month && day && year >= 1900 && year <= 2025 && month >= 1 && month <= 12 && day >= 1 && day <= 31;
}

function getPersonProfile(year, month, day) {
  const dp = calcDayPillar(year, month, day);
  const { cycleKey, polarityKey, polarityLabel, isResonance, voidStr } = calcCycle(dp.index, year, month, day);
  const { stageKey } = calcFortuneStage({ cycleKey, polarityKey, voidStr }, new Date().getFullYear());
  const actionStyle = calcActionStyle(dp.stem, dp.branch);
  const reading = generateReading(dp, actionStyle, cycleKey, polarityKey, stageKey, isResonance);
  const cycleData = PARTS.cycles[cycleKey];

  return {
    year, month, day, dp, actionStyle, reading,
    cycleKey, cycleLabel: cycleData.display + polarityLabel,
  };
}

function relationBetweenElements(a, b) {
  if (a === b) return 'same';
  const aIndex = ELEMENT_ORDER.indexOf(a);
  const bIndex = ELEMENT_ORDER.indexOf(b);
  if ((aIndex + 1) % ELEMENT_ORDER.length === bIndex || (bIndex + 1) % ELEMENT_ORDER.length === aIndex) {
    return 'generate';
  }
  if ((aIndex + 2) % ELEMENT_ORDER.length === bIndex || (bIndex + 2) % ELEMENT_ORDER.length === aIndex) {
    return 'control';
  }
  return 'other';
}

function scoreElementPair(a, b) {
  const relation = relationBetweenElements(a, b);
  const scores = { generate: 20, same: 15, control: 8, other: 12 };
  return { relation, score: scores[relation] };
}

function isActionComplement(a, b) {
  return ACTION_COMPLEMENTS.some(pair => pair.includes(a) && pair.includes(b));
}

function isActionNear(a, b) {
  return ACTION_GROUPS.some(group => group.includes(a) && group.includes(b));
}

function scoreActionPair(a, b) {
  if (isActionComplement(a, b)) return { relation: 'complement', score: a === b ? 24 : 30 };
  if (isActionNear(a, b)) return { relation: 'near', score: a === b ? 24 : 22 };
  const aIndex = JYUNITEN['甲'].indexOf(a);
  const bIndex = JYUNITEN['甲'].indexOf(b);
  const distance = Math.abs(aIndex - bIndex);
  if (distance === 6) return { relation: 'tension', score: 16 };
  return { relation: 'balance', score: 20 };
}

function scoreCyclePair(a, b) {
  if (a === b) return { relation: 'same', score: 30 };
  const aIndex = CYCLE_ORDER.indexOf(a);
  const bIndex = CYCLE_ORDER.indexOf(b);
  const distance = Math.abs(aIndex - bIndex);
  const wrappedDistance = Math.min(distance, CYCLE_ORDER.length - distance);
  if (wrappedDistance === 1) return { relation: 'generate', score: 25 };
  if (wrappedDistance === 2) return { relation: 'stimulate', score: 20 };
  return { relation: 'adjust', score: 16 };
}

function getScoreBand(score) {
  if (score >= 85) return '深く共鳴しやすい組み合わせ';
  if (score >= 70) return '補い合う力が自然に働く組み合わせ';
  if (score >= 55) return '違いが刺激になる関係';
  if (score >= 40) return '理解に時間がかかるが深まると強い関係';
  return 'お互いの個性が際立つ関係';
}

function describeElementCompatibility(a, b, stemScore, branchScore) {
  const stemA = ELEMENT_LABELS[STEM_ELEMENTS[a.dp.stem]];
  const stemB = ELEMENT_LABELS[STEM_ELEMENTS[b.dp.stem]];
  const branchA = ELEMENT_LABELS[BRANCH_ELEMENTS[a.dp.branch]];
  const branchB = ELEMENT_LABELS[BRANCH_ELEMENTS[b.dp.branch]];
  const relation = stemScore.score + branchScore.score;
  if (relation >= 34) {
    return `${stemA}と${stemB}、${branchA}と${branchB}が自然に流れを作る組み合わせです。考え方の違いも、関係を進める力になりやすいです。`;
  }
  if (relation >= 26) {
    return `${stemA}と${stemB}、${branchA}と${branchB}がほどよく重なります。似ている部分と違う部分の両方があり、会話の中で理解が深まります。`;
  }
  return `${stemA}と${stemB}、${branchA}と${branchB}の個性がはっきり出る組み合わせです。違いを正そうとせず、役割の違いとして見るほど関係が育ちます。`;
}

function describeActionCompatibility(a, b, actionScore) {
  const aWord = a.reading.action.modifier_word;
  const bWord = b.reading.action.modifier_word;
  if (actionScore.relation === 'complement') {
    return `${aWord}と${bWord}は補完関係です。一方が足場を作り、もう一方が流れを動かすように、役割が自然に分かれやすいです。`;
  }
  if (actionScore.relation === 'near') {
    return `${aWord}と${bWord}は近いテンポを持ちます。安心感が生まれやすいぶん、停滞した時はどちらかが小さく動くと流れが戻ります。`;
  }
  if (actionScore.relation === 'tension') {
    return `${aWord}と${bWord}は動き出すタイミングに差が出やすい関係です。急がせず、止めすぎず、相手の速度を尊重すると強みになります。`;
  }
  return `${aWord}と${bWord}は違いを活かせる関係です。得意な場面が分かれるため、任せるところを決めると噛み合いやすくなります。`;
}

function describeCycleCompatibility(a, b, cycleScore) {
  if (cycleScore.relation === 'same') {
    return `同じ${PARTS.cycles[a.cycleKey].display}タイプです。根本的な価値観が近く、長期的に安定しやすい組み合わせです。`;
  }
  if (cycleScore.relation === 'generate') {
    return `${PARTS.cycles[a.cycleKey].display}と${PARTS.cycles[b.cycleKey].display}が流れを生みます。片方の動きが、もう片方の力を引き出しやすい関係です。`;
  }
  if (cycleScore.relation === 'stimulate') {
    return `${PARTS.cycles[a.cycleKey].display}と${PARTS.cycles[b.cycleKey].display}が刺激し合います。違いがあるからこそ、新しい視点や行動が生まれやすいです。`;
  }
  return `${PARTS.cycles[a.cycleKey].display}と${PARTS.cycles[b.cycleKey].display}は調整しながら深まる関係です。距離感を整えるほど、無理なく続きます。`;
}

function calculateCompatibilityScore(a, b) {
  const stemScore = scoreElementPair(STEM_ELEMENTS[a.dp.stem], STEM_ELEMENTS[b.dp.stem]);
  const branchScore = scoreElementPair(BRANCH_ELEMENTS[a.dp.branch], BRANCH_ELEMENTS[b.dp.branch]);
  const meishikiScore = stemScore.score + branchScore.score;
  const actionScore = scoreActionPair(a.actionStyle, b.actionStyle);
  const cycleScore = scoreCyclePair(a.cycleKey, b.cycleKey);
  const total = meishikiScore + actionScore.score + cycleScore.score;

  return {
    total,
    band: getScoreBand(total),
    meishiki: {
      score: meishikiScore,
      max: 40,
      comment: describeElementCompatibility(a, b, stemScore, branchScore),
    },
    action: {
      score: actionScore.score,
      max: 30,
      comment: describeActionCompatibility(a, b, actionScore),
    },
    cycle: {
      score: cycleScore.score,
      max: 30,
      comment: describeCycleCompatibility(a, b, cycleScore),
    },
  };
}

let _compatData = null;

function calculateCompatibility() {
  const ay = parseInt(document.getElementById('compat-a-year').value);
  const am = parseInt(document.getElementById('compat-a-month').value);
  const ad = parseInt(document.getElementById('compat-a-day').value);
  const by = parseInt(document.getElementById('compat-b-year').value);
  const bm = parseInt(document.getElementById('compat-b-month').value);
  const bd = parseInt(document.getElementById('compat-b-day').value);

  if (!isValidDateInput(ay, am, ad) || !isValidDateInput(by, bm, bd)) {
    alert('2人分の生年月日を正しく入力してください。');
    return;
  }

  const personA = getPersonProfile(ay, am, ad);
  const personB = getPersonProfile(by, bm, bd);
  const compatibility = calculateCompatibilityScore(personA, personB);
  renderCompatibility(personA, personB, compatibility);
}

function renderCompatibility(personA, personB, compatibility) {
  const result = document.getElementById('compat-result');
  const bars = [
    ['命式', compatibility.meishiki.score, compatibility.meishiki.max],
    ['行動', compatibility.action.score, compatibility.action.max],
    ['周期', compatibility.cycle.score, compatibility.cycle.max],
  ];

  _compatData = { personA, personB, compatibility };

  result.innerHTML = `
    <div class="compat-score-card">
      <p class="compat-score-label">COMPATIBILITY SCORE</p>
      <div class="compat-score">${compatibility.total}<span> / 100</span></div>
      <p class="compat-score-title">${compatibility.band}</p>
    </div>

    <div class="compat-people">
      <div class="compat-person-card">
        <p class="compat-person-name">あなた</p>
        <p class="compat-person-summary">${personA.reading.title}（${personA.dp.kanshi}・${personA.reading.action.modifier_word}・${personA.cycleLabel}）</p>
      </div>
      <div class="compat-person-card">
        <p class="compat-person-name">相手</p>
        <p class="compat-person-summary">${personB.reading.title}（${personB.dp.kanshi}・${personB.reading.action.modifier_word}・${personB.cycleLabel}）</p>
      </div>
    </div>

    <div class="compat-score-card">
      <div class="compat-breakdown">
        ${bars.map(([label, score, max]) => `
          <div class="compat-bar-row">
            <span>${label}</span>
            <div class="compat-bar-track"><div class="compat-bar-fill" style="width:${Math.round(score / max * 100)}%"></div></div>
            <span>${score}/${max}</span>
          </div>
        `).join('')}
      </div>
    </div>

    <div class="compat-comments">
      <div class="compat-comment-card">
        <p class="detail-card-label">命式の相性</p>
        <p class="detail-card-body">${compatibility.meishiki.comment}</p>
      </div>
      <div class="compat-comment-card">
        <p class="detail-card-label">行動の相性</p>
        <p class="detail-card-body">${compatibility.action.comment}</p>
      </div>
      <div class="compat-comment-card">
        <p class="detail-card-label">周期の相性</p>
        <p class="detail-card-body">${compatibility.cycle.comment}</p>
      </div>
    </div>

    <button class="copy-btn" id="compat-copy-btn" onclick="copyCompatibility()">
      <span>相性をコピー</span>
    </button>
    <button class="copy-btn" onclick="shareCompatibility()">
      <span>Xでシェア</span>
    </button>
  `;

  result.classList.add('visible');
  result.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function toggleDetail() {
  const section = document.getElementById('detail-section');
  const cards = document.getElementById('detail-cards');
  const icon = document.getElementById('toggle-icon');
  const isOpen = cards.classList.contains('visible');

  if (isOpen) {
    cards.classList.remove('visible');
    section.classList.remove('visible');
    icon.classList.remove('open');
    document.getElementById('detail-toggle').querySelector('span').textContent = '詳しく見る';
  } else {
    section.classList.add('visible');
    cards.classList.add('visible');
    icon.classList.add('open');
    document.getElementById('detail-toggle').querySelector('span').textContent = '閉じる';
  }
}

function reset() {
  document.getElementById('result-section').classList.remove('visible');
  document.getElementById('result-section').classList.remove('fade-in');
  document.getElementById('year').value = '';
  document.getElementById('month').value = '';
  document.getElementById('day').value = '';
  document.getElementById('detail-cards').classList.remove('visible');
  document.getElementById('detail-section').classList.remove('visible');
  document.getElementById('toggle-icon').classList.remove('open');
}

// 今年をデフォルト表示
document.getElementById('current-year').placeholder = new Date().getFullYear();

// コピー用データ保持
let _copyData = null;

function copyResult() {
  if (!_copyData) return;
  const { title, no, kanshi, actionWord, cycleLabel, fortuneLabel, isResonance } = _copyData;
  const url = location.href.split('?')[0];
  const resonanceLine = isResonance ? '\n共鳴型' : '';
  const text = `私の命軸は「${title}」でした。\n\n命式 No.${no}　${kanshi}\n${actionWord} / ${cycleLabel} / 今年：${fortuneLabel}${resonanceLine}\n\n▶ 命軸で自分を読む → ${url}`;

  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.classList.add('copied');
    btn.querySelector('span').textContent = 'コピーしました';
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.querySelector('span').textContent = '結果をコピー';
    }, 2000);
  }).catch(() => {
    // フォールバック
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    const btn = document.getElementById('copy-btn');
    btn.classList.add('copied');
    btn.querySelector('span').textContent = 'コピーしました';
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.querySelector('span').textContent = '結果をコピー';
    }, 2000);
  });
}

function buildCompatibilityShareText() {
  if (!_compatData) return '';
  const { personA, personB, compatibility } = _compatData;
  const url = location.href.split('?')[0];
  return `命軸の相性診断は ${compatibility.total}/100 でした。\n\nあなた：${personA.reading.title}（${personA.dp.kanshi}・${personA.reading.action.modifier_word}）\n相手：${personB.reading.title}（${personB.dp.kanshi}・${personB.reading.action.modifier_word}）\n\n${compatibility.band}\n\n▶ 命軸で相性を見る → ${url}`;
}

function copyCompatibility() {
  if (!_compatData) return;
  const text = buildCompatibilityShareText();
  const btn = document.getElementById('compat-copy-btn');
  const setCopied = () => {
    btn.classList.add('copied');
    btn.querySelector('span').textContent = 'コピーしました';
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.querySelector('span').textContent = '相性をコピー';
    }, 2000);
  };

  navigator.clipboard.writeText(text).then(setCopied).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    setCopied();
  });
}

function shareCompatibility() {
  if (!_compatData) return;
  const text = buildCompatibilityShareText();
  const shareUrl = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`;
  window.open(shareUrl, '_blank', 'noopener,noreferrer');
}
